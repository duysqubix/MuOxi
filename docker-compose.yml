version: "3.7"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: muoxi:dev
    volumes:
      - muoxi_data:/opt/muoxi/data
    environment:
      DATABASE_URL: /opt/muoxi/data/world.db
      RUST_LOG: info
      REDIS_SERVER: redis://redis:6379
    ports:
      - "${MUOXI_SERVER_PORT:-8000}:8000"
      - "${MUOXI_WEB_PORT:-8080}:8080"
    depends_on:
      - redis
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend

volumes:
  muoxi_data:
  redis_data:

networks:
  backend:
